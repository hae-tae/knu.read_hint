<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HINT TERMINAL — 방탈출 힌트 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c-bg: #04070f;
    --c-deep: #080d1a;
    --c-panel: #0b1220;
    --c-border: #1a2d4a;
    --c-glow: #1e5f8a;
    --c-accent: #3aafd4;
    --c-accent2: #0f4f6d;
    --c-text: #8ab8cc;
    --c-dim: #2a4a5e;
    --c-success: #2affb3;
    --c-danger: #ff3a5c;
    --c-warn: #ffb83a;
    --font-mono: 'Share Tech Mono', monospace;
    --font-display: 'Orbitron', sans-serif;
    --font-kr: 'Noto Sans KR', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--c-bg);
    color: var(--c-text);
    font-family: var(--font-mono);
    overflow: hidden;
  }

  /* Star field */
  .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    opacity: var(--o, 0.4);
  }
  @keyframes twinkle {
    0%, 100% { opacity: var(--o, 0.4); }
    50% { opacity: calc(var(--o, 0.4) * 0.2); }
  }

  /* Scan lines */
  .scanlines {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom, transparent, transparent 2px,
      rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
    );
  }

  /* Status bar */
  .statusbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 36px; background: var(--c-panel);
    border-bottom: 1px solid var(--c-border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.5rem; font-size: 10px; letter-spacing: 0.15em;
    color: var(--c-dim); z-index: 10;
  }
  .statusbar .blink { color: var(--c-accent); animation: blink 1.2s step-end infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .status-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--c-success);
    margin-right: 6px; animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* Main layout */
  .shell {
    position: relative; z-index: 2; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem;
  }

  /* Terminal window */
  .terminal {
    width: 100%; max-width: 580px;
    background: var(--c-panel);
    border: 1px solid var(--c-glow);
    border-radius: 4px; overflow: hidden; position: relative;
  }
  .terminal::before {
    content: ''; position: absolute; inset: -1px;
    border-radius: 4px; border: 1px solid var(--c-glow);
    opacity: 0.3; pointer-events: none;
  }

  /* Terminal title bar */
  .terminal-bar {
    background: var(--c-deep); border-bottom: 1px solid var(--c-border);
    padding: 8px 1rem; display: flex; align-items: center; gap: 8px;
    font-size: 10px; letter-spacing: 0.12em; color: var(--c-dim);
  }
  .tbar-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--c-border); }
  .tbar-title {
    flex: 1; text-align: center; font-family: var(--font-display);
    font-size: 9px; letter-spacing: 0.25em; color: var(--c-accent);
  }

  /* Terminal body */
  .terminal-body { padding: 1.75rem 2rem 1.5rem; }

  /* Header */
  .main-title {
    font-family: var(--font-display); font-weight: 900;
    font-size: clamp(16px, 3.5vw, 24px); letter-spacing: 0.2em;
    color: #ffffff; text-align: center; margin-bottom: 4px; line-height: 1.2;
  }
  .sub-title {
    font-family: var(--font-kr); font-weight: 300; font-size: 11px;
    letter-spacing: 0.2em; color: var(--c-dim);
    text-align: center; margin-bottom: 1.5rem;
  }

  /* Divider */
  .divider { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; }
  .divider-line { flex: 1; height: 1px; background: var(--c-border); }
  .divider-icon {
    width: 20px; height: 20px; border: 1px solid var(--c-glow);
    transform: rotate(45deg); display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
  }
  .divider-icon::after {
    content: ''; width: 6px; height: 6px;
    background: var(--c-accent); transform: rotate(0deg);
  }

  /* Log area */
  .log-area {
    background: var(--c-bg); border: 1px solid var(--c-border); border-radius: 2px;
    padding: 0.75rem 1rem; margin-bottom: 1.25rem; min-height: 56px;
    font-size: 11px; line-height: 1.8; color: var(--c-dim); font-family: var(--font-mono);
    overflow: hidden;
  }
  .log-area .log-line { display: block; opacity: 0; animation: fadeIn 0.3s forwards; }
  .log-area .log-line.success { color: var(--c-success); }
  .log-area .log-line.danger  { color: var(--c-danger); }
  .log-area .log-line.info    { color: var(--c-accent); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Input field */
  .input-row { display: flex; gap: 10px; align-items: stretch; margin-bottom: 1rem; }
  .input-prefix {
    display: flex; align-items: center; color: var(--c-accent);
    font-size: 13px; white-space: nowrap; flex-shrink: 0; user-select: none;
  }
  .code-input {
    flex: 1; background: var(--c-bg); border: 1px solid var(--c-glow);
    border-radius: 2px; padding: 10px 14px; color: white;
    font-family: var(--font-display); font-size: 16px;
    letter-spacing: 0.3em; text-transform: uppercase; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .code-input::placeholder {
    color: var(--c-dim); font-size: 11px; letter-spacing: 0.15em; font-family: var(--font-mono);
  }
  .code-input:focus { border-color: var(--c-accent); }

  /* Submit button */
  .submit-btn {
    width: 100%; background: transparent; border: 1px solid var(--c-glow);
    color: var(--c-accent); font-family: var(--font-display); font-size: 11px;
    font-weight: 700; letter-spacing: 0.3em; padding: 12px; cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    text-transform: uppercase; border-radius: 2px; margin-bottom: 1.25rem;
  }
  .submit-btn:hover { background: var(--c-accent2); border-color: var(--c-accent); color: white; }
  .submit-btn:active { transform: scale(0.99); }

  /* Hint display box */
  .hint-box {
    background: rgba(42, 255, 179, 0.04);
    border: 1px solid var(--c-success);
    border-radius: 2px;
    padding: 1.25rem 1.25rem;
    margin-bottom: 1rem;
    display: none;
    animation: hintReveal 0.5s ease-out forwards;
  }
  .hint-box.show { display: block; }
  @keyframes hintReveal {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .hint-label {
    font-family: var(--font-display); font-size: 9px;
    letter-spacing: 0.3em; color: var(--c-success);
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .hint-label::before {
    content: ''; display: inline-block; width: 6px; height: 6px;
    background: var(--c-success); border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .hint-code-tag {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--c-dim); letter-spacing: 0.2em; margin-left: auto;
  }
  .hint-text {
    font-family: var(--font-kr); font-size: 14px; font-weight: 400;
    color: #c8f0e8; line-height: 1.9; letter-spacing: 0.05em;
    word-break: keep-all;
  }

  /* Footer */
  .footer-info {
    display: flex; justify-content: space-between; padding-top: 1rem;
    border-top: 1px solid var(--c-border); font-size: 9px;
    letter-spacing: 0.12em; color: var(--c-dim);
  }

  /* Shake animation */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    15% { transform: translateX(-6px); }
    30% { transform: translateX(6px); }
    45% { transform: translateX(-4px); }
    60% { transform: translateX(4px); }
    75% { transform: translateX(-2px); }
    90% { transform: translateX(2px); }
  }
  .shake { animation: shake 0.45s ease-out; }

  /* Flash animations */
  @keyframes successFlash {
    0% { border-color: var(--c-glow); }
    30% { border-color: var(--c-success); box-shadow: 0 0 20px rgba(42,255,179,0.2); }
    100% { border-color: var(--c-glow); }
  }
  .success-flash { animation: successFlash 1.2s ease-out; }

  @keyframes dangerFlash {
    0% { border-color: var(--c-glow); }
    30% { border-color: var(--c-danger); box-shadow: 0 0 20px rgba(255,58,92,0.2); }
    100% { border-color: var(--c-glow); }
  }
  .danger-flash { animation: dangerFlash 0.8s ease-out; }

  /* Coordinate display */
  .coord-display {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    font-size: 9px; letter-spacing: 0.1em; color: var(--c-border);
    text-align: right; line-height: 1.8; z-index: 10;
  }

  /* Typewriter cursor */
  .typing::after {
    content: '█'; color: var(--c-success); animation: blink 0.8s step-end infinite;
  }
</style>
</head>
<body>

<div class="stars" id="starfield"></div>
<div class="scanlines"></div>

<div class="statusbar">
  <span><span class="status-dot"></span>HINT SYSTEM ONLINE</span>
  <span class="blink">●</span>
  <span id="clock">00:00:00</span>
</div>

<div class="shell">
  <div class="terminal" id="terminal">
    <div class="terminal-bar">
      <div class="tbar-dot"></div>
      <div class="tbar-dot"></div>
      <div class="tbar-dot"></div>
      <div class="tbar-title"></div>
    </div>
    <div class="terminal-body">

      <div class="main-title">HINT<br>SERVICE</div>
      <div class="sub-title">힌트 코드를 입력하고 단서를 확인하세요</div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-icon"></div>
        <div class="divider-line"></div>
      </div>

      <div class="log-area" id="logArea">
        <span class="log-line info" id="initLog1">&gt; HINT DATABASE LOADED — 10 RECORDS</span>
        <span class="log-line info" id="initLog2">&gt; AWAITING HINT CODE INPUT...</span>
      </div>

      <!-- Hint result box -->
      <div class="hint-box" id="hintBox">
        <div class="hint-label">
          HINT UNLOCKED
          <span class="hint-code-tag" id="hintCodeTag"></span>
        </div>
        <div class="hint-text" id="hintText"></div>
      </div>

      <div class="input-row">
        <div class="input-prefix">HINT_CODE://</div>
        <input
          class="code-input"
          id="codeInput"
          type="text"
          placeholder="enter hint code"
          maxlength="24"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
        ▶ RETRIEVE HINT
      </button>

      <div class="footer-info">
        <span>ESCAPE ROOM HINT SYSTEM</span>
        <span id="hintCount">HINTS RETRIEVED: 0</span>
      </div>

    </div>
  </div>
</div>

<div class="coord-display" id="coords">
  <div>ROOM STATUS: ACTIVE</div>
  <div id="sessionTime">SESSION: 00:00</div>
</div>

<script>
  // ─── 힌트 데이터 (CSV 파일 내용을 여기에 넣거나, 아래처럼 직접 정의)
  //     실제 운영 시: fetch('hints.csv')로 외부 CSV를 불러올 수 있습니다.
  // ──────────────────────────────────────────────────────────────────────
  const CSV_DATA = `힌트코드,힌트
    XQBF,첫번째 힌트
    R7M2,두번째 힌트
    K4NP,세번째 힌트
    9WZT,네번째 힌트
    L3VJ,다섯번째 힌트
    H8DY,여섯번째 힌트
    2CRG,일곱번째 힌트
    A6KS,여덟번째 힌트
    7FPW,아홉번째 힌트
    NE5Q,열번째 힌트`;

  // CSV 파싱
  function parseCSV(csvText) {
    const lines = csvText.trim().split('\n');
    const map = {};
    // 첫 줄은 헤더이므로 1번부터 시작
    for (let i = 1; i < lines.length; i++) {
      const commaIdx = lines[i].indexOf(',');
      if (commaIdx === -1) continue;
      const code = lines[i].slice(0, commaIdx).trim().toUpperCase();
      const hint = lines[i].slice(commaIdx + 1).trim();
      map[code] = hint;
    }
    return map;
  }

  const HINTS = parseCSV(CSV_DATA);

  // ─── 외부 CSV 파일을 쓰려면 위 CSV_DATA 대신 아래 코드를 사용하세요 ───
  // let HINTS = {};
  // fetch('hints.csv')
  //   .then(r => r.text())
  //   .then(text => { HINTS = parseCSV(text); });
  // ─────────────────────────────────────────────────────────────────────

  let retrievedCount = 0;
  const sessionStart = Date.now();

  // Star field
  const starfield = document.getElementById('starfield');
  for (let i = 0; i < 160; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() < 0.15 ? 2 : 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --o:${0.2 + Math.random()*0.6};
      --d:${2 + Math.random()*5}s;
      animation-delay:${Math.random()*5}s;
    `;
    starfield.appendChild(s);
  }

  // Clock
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `${h}:${m}:${s}`;

    const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
    const em = String(Math.floor(elapsed / 60)).padStart(2,'0');
    const es = String(elapsed % 60).padStart(2,'0');
    document.getElementById('sessionTime').textContent = `SESSION: ${em}:${es}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // Log
  function addLog(msg, type = 'info') {
    const area = document.getElementById('logArea');
    const line = document.createElement('span');
    line.className = `log-line ${type}`;
    line.style.animationDelay = '0s';
    line.textContent = msg;
    area.appendChild(line);
    while (area.children.length > 5) area.removeChild(area.firstChild);
    area.scrollTop = area.scrollHeight;
  }

  // Web Audio tones
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let ctx;
  function ensureCtx() { if (!ctx) ctx = new AudioCtx(); return ctx; }

  function playSuccessTone() {
    try {
      const c = ensureCtx();
      [440, 554, 659].forEach((freq, i) => {
        const osc = c.createOscillator(), gain = c.createGain();
        osc.connect(gain); gain.connect(c.destination);
        osc.frequency.value = freq; osc.type = 'sine';
        const t = c.currentTime + i * 0.1;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.15, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        osc.start(t); osc.stop(t + 0.45);
      });
    } catch(e) {}
  }

  function playFailTone() {
    try {
      const c = ensureCtx();
      [[200, 0], [170, 0.15]].forEach(([freq, delay]) => {
        const osc = c.createOscillator(), gain = c.createGain();
        osc.connect(gain); gain.connect(c.destination);
        osc.frequency.value = freq; osc.type = 'sawtooth';
        const t = c.currentTime + delay;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.12, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        osc.start(t); osc.stop(t + 0.3);
      });
    } catch(e) {}
  }

  // Typewriter effect for hint text
  function typewriterText(el, text, speed = 30) {
    el.textContent = '';
    el.classList.add('typing');
    let i = 0;
    const timer = setInterval(() => {
      el.textContent += text[i];
      i++;
      if (i >= text.length) {
        clearInterval(timer);
        el.classList.remove('typing');
      }
    }, speed);
  }

  // Submit handler
  function handleSubmit() {
    const input = document.getElementById('codeInput');
    const terminal = document.getElementById('terminal');
    const val = input.value.trim().toUpperCase();

    if (!val) return;

    const hint = HINTS[val];

    if (hint) {
      // ─── HIT ───
      terminal.classList.add('success-flash');
      setTimeout(() => terminal.classList.remove('success-flash'), 1200);
      playSuccessTone();

      addLog(`> HINT CODE ACCEPTED: ${val}`, 'success');
      addLog(`> DECRYPTING HINT DATA...`, 'info');

      // 힌트 박스 표시
      const hintBox = document.getElementById('hintBox');
      const hintText = document.getElementById('hintText');
      const hintCodeTag = document.getElementById('hintCodeTag');

      hintCodeTag.textContent = `[${val}]`;
      hintBox.classList.remove('show');

      // 살짝 딜레이 후 타이프라이터로 표시
      setTimeout(() => {
        hintBox.classList.add('show');
        typewriterText(hintText, hint, 28);
      }, 300);

      retrievedCount++;
      document.getElementById('hintCount').textContent = `HINTS RETRIEVED: ${retrievedCount}`;

    } else {
      // ─── MISS ───
      terminal.classList.add('shake');
      terminal.classList.add('danger-flash');
      setTimeout(() => {
        terminal.classList.remove('shake');
        terminal.classList.remove('danger-flash');
      }, 600);
      playFailTone();

      addLog(`> UNKNOWN CODE: "${val}"`, 'danger');
      addLog(`> HINT NOT FOUND — CHECK CODE AND RETRY`, 'danger');
    }

    input.value = '';
    input.focus();
  }

  // Enter key
  document.getElementById('codeInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleSubmit();
  });

  // Focus on load
  window.addEventListener('load', () => {
    document.getElementById('codeInput').focus();
  });
</script>
</body>
</html>
